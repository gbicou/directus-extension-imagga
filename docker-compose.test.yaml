services:
  directus:
    image: directus/directus:11.15.2@sha256:b850715761454b489364526ad2f2dc0570855a42869e9c4be5b0eecf6d8a009c
    ports:
      - 8055:8055
    volumes:
      - ./:/directus/extensions/imagga
    env_file: ".env.test"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8055/server/health || exit 1"]
      start_period: 20s
  imagga:
    image: wiremock/wiremock:3.13.2@sha256:27c4b74404f58ceedc6899f73abdfe228d8f80d5efa4d8bd42d6c155558b677c
    ports:
      - 8080:8080
    volumes:
      - ./mocks:/home/wiremock
